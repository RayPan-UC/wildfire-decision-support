openapi: 3.0.0
info:
  title: Wildfire Decision Support API
  version: 1.0.0

paths:

  # ── Auth ──────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                password:
                  type: string
                  minLength: 6
      responses:
        201:
          description: Account created successfully
        400:
          description: Validation error
        409:
          description: Username already exists

  /api/auth/login:
    post:
      summary: Login and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  username:
                    type: string
        401:
          description: Invalid credentials

  /api/auth/verify:
    get:
      summary: Verify a JWT token
      security:
        - bearerAuth: []
      responses:
        200:
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  username:
                    type: string
        401:
          description: Token invalid or expired

  # ── Events ────────────────────────────────────────────────────────

  /api/events/:
    get:
      summary: List all fire events
      responses:
        200:
          description: Array of fire events ordered by year descending
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    year:
                      type: integer
                    time_start:
                      type: string
                      format: date-time
                    time_end:
                      type: string
                      format: date-time
                    description:
                      type: string
                    bbox:
                      type: array
                      items:
                        type: number
                      description: "[minLon, minLat, maxLon, maxLat]"
                      example: [-112.634, 56.157, -110.002, 57.380]

  # ── Data ──────────────────────────────────────────────────────────

  /api/data/status:
    get:
      summary: Check static dataset readiness and pipeline status
      description: >
        Reports whether each static dataset is ready. If any dataset is missing,
        the server starts a background download automatically on startup.
        Poll this endpoint to track progress.
      responses:
        200:
          description: Dataset status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ready:
                    type: boolean
                    description: True only if all datasets are ready
                  pipeline_running:
                    type: boolean
                    description: True while background download is in progress
                  current:
                    type: string
                    nullable: true
                    description: Dataset currently being downloaded (e.g. "landcover")
                  error:
                    type: string
                    nullable: true
                    description: Error message if pipeline failed
                  datasets:
                    type: object
                    properties:
                      landcover:
                        $ref: '#/components/schemas/DatasetStatus'
                      community:
                        $ref: '#/components/schemas/DatasetStatus'
                      population:
                        $ref: '#/components/schemas/DatasetStatus'
                      osm:
                        type: object
                        properties:
                          ready:
                            type: boolean

  # ── WIP ───────────────────────────────────────────────────────────

  /api/hotspots:
    get:
      summary: "[WIP] Get fire hotspots (NASA FIRMS)"
      responses:
        200:
          description: GeoJSON hotspot features

  /api/risk-zones:
    post:
      summary: "[WIP] Fire spread simulation (ML model)"
      responses:
        200:
          description: Risk zone polygon

  /api/chat:
    post:
      summary: "[WIP] AI wildfire assistant"
      responses:
        200:
          description: Assistant response

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DatasetStatus:
      type: object
      properties:
        ready:
          type: boolean
        years:
          type: array
          items:
            type: integer
          description: Years that are downloaded
        missing:
          type: array
          items:
            type: integer
          description: Years that are missing
