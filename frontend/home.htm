<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WildfireAI — Situational Awareness System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    #home-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: 52px;
      background: rgba(15, 17, 23, 0.92);
      border-bottom: 1px solid #1e2130;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      backdrop-filter: blur(8px);
    }

    .home-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    .home-logo em { color: #ff6b35; font-style: normal; }

    .header-right-home {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rt-badge-home {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
      border: 1px solid #2a2d3e;
      border-radius: 20px;
      padding: 4px 12px;
    }

    .rt-dot-home {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
    }

    .btn-login-home {
      background: transparent;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      padding: 6px 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-login-home:hover { border-color: #ff6b35; color: #ff6b35; }

    /* Grid view */
    #home-grid {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 32px;
      background: #0f1117;
    }

    #home-grid.hidden { display: none; }

    .region-card {
      border-radius: 14px;
      border: 1px solid #1e2130;
      background: #13172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 32px;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .region-card.clickable {
      cursor: pointer;
    }

    .region-card.clickable:hover {
      border-color: #ff6b35;
      box-shadow: 0 0 32px rgba(255, 107, 53, 0.15);
    }

    .region-card.locked {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .card-icon {
      font-size: 48px;
      line-height: 1;
    }

    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .card-desc {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      max-width: 260px;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 20px;
      padding: 5px 14px;
    }

    .badge-coming-soon {
      background: rgba(255,255,255,0.05);
      border: 1px solid #2a2d3e;
      color: #666;
    }

    .badge-available {
      background: rgba(255, 107, 53, 0.12);
      border: 1px solid #ff6b35;
      color: #ff6b35;
    }

    /* Map */
    #home-map {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
      display: none;
    }

    #home-map.visible { display: block; }

    /* Custom marker */
    .fire-marker-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    .fire-marker-icon {
      width: 38px; height: 38px;
      background: #1a1a2e;
      border: 2px solid #ff6b35;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 12px rgba(255, 107, 53, 0.5);
    }

    .fire-marker-label {
      margin-top: 5px;
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid #ff6b35;
      border-radius: 20px;
      color: #ff6b35;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      white-space: nowrap;
    }

    /* Event popup card */
    #event-card {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      width: 340px;
      background: #13172a;
      border: 1px solid #ff6b35;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    #event-card.hidden { display: none; }

    .card-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none;
      border: none;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }

    .card-close:hover { color: #fff; }

    #card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      padding-right: 20px;
    }

    #card-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .card-stats {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-top: 1px solid #1e2130;
      border-bottom: 1px solid #1e2130;
      padding: 14px 0;
    }

    .card-stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: center;
    }

    .card-stat + .card-stat {
      border-left: 1px solid #1e2130;
    }

    .stat-lbl {
      font-size: 9px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #666;
    }

    .stat-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #ff6b35;
    }

    .btn-explore {
      display: block;
      width: 100%;
      background: #ff6b35;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: background 0.2s;
      text-align: center;
    }

    .btn-explore:hover { background: #e55a25; }
  </style>
</head>
<body>

  <header id="home-header">
    <a class="home-logo" href="/">🔥 <em>Wildfire</em>AI</a>
    <div class="header-right-home">
      <div class="rt-badge-home">
        <span class="rt-dot-home"></span> Realtime 🔒
      </div>
      <button class="btn-login-home" onclick="window.location.href='/login'">Login</button>
    </div>
  </header>

  <!-- Region selector grid -->
  <div id="home-grid">
    <!-- Realtime — locked / coming soon -->
    <div class="region-card locked">
      <div class="card-icon">📡</div>
      <div class="card-name">Realtime</div>
      <div class="card-desc">Live wildfire monitoring and active incident tracking.</div>
      <span class="card-badge badge-coming-soon">🔒 Coming Soon</span>
    </div>

    <!-- Fort McMurray -->
    <div class="region-card clickable" id="card-fortmcmurray">
      <div class="card-icon">🔥</div>
      <div class="card-name">Fort McMurray</div>
      <div class="card-desc">Horse River Fire · May 2016 · Alberta, Canada<br/>589,552 ha burned · ~88,000 evacuees</div>
      <span class="card-badge badge-available">Explore Event →</span>
    </div>
  </div>

  <div id="home-map"></div>

  <!-- Event detail card -->
  <div id="event-card" class="hidden">
    <button class="card-close" onclick="closeCard()">×</button>
    <div id="card-title"></div>
    <div id="card-subtitle"></div>
    <div class="card-stats">
      <div class="card-stat">
        <span class="stat-lbl">Area Burned</span>
        <span class="stat-val" id="card-area"></span>
      </div>
      <div class="card-stat">
        <span class="stat-lbl">Evacuees</span>
        <span class="stat-val" id="card-evacuees"></span>
      </div>
      <div class="card-stat">
        <span class="stat-lbl">Est. Damage</span>
        <span class="stat-val" id="card-damage"></span>
      </div>
    </div>
    <button class="btn-explore" id="btn-explore">Explore Event →</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/home.js"></script>

</body>
</html>
