<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - AI Assisted Wildfire System</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0f1117;
      margin: 0;
    }

    .login-card {
      background: #13172a;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 40px 36px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-logo {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
    }

    .login-logo span {
      color: #ff6b35;
    }

    .login-subtitle {
      text-align: center;
      font-size: 12px;
      color: #555;
      margin-top: -12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      color: #ffffff;
      padding: 10px 14px;
      font-size: 13px;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #4a90e2;
    }

    .btn-login {
      background: #ff6b35;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-login:hover { background: #e55a25; }
    .btn-login:disabled { background: #7a3a20; cursor: not-allowed; }

    .error-msg {
      background: rgba(220, 50, 30, 0.15);
      border: 1px solid rgba(220, 50, 30, 0.4);
      border-radius: 6px;
      color: #e05a40;
      font-size: 12px;
      padding: 8px 12px;
      text-align: center;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1px solid #2a2d3e;
      margin: 0;
    }

    .register-link {
      text-align: center;
      font-size: 12px;
      color: #555;
    }

    .register-link a {
      color: #4a90e2;
      text-decoration: none;
      cursor: pointer;
    }

    .register-link a:hover { text-decoration: underline; }

    /* Register form — hidden by default */
    #register-section { display: none; }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="login-logo">🔥 <span>Wildfire</span> Insight</div>
    <p class="login-subtitle">AI-Assisted Situational Awareness System</p>

    <hr class="divider"/>

    <!-- Error message -->
    <div class="error-msg" id="error-msg"></div>

    <!-- LOGIN FORM -->
    <div id="login-section">
      <div style="display:flex; flex-direction:column; gap:14px;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter username" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password"/>
        </div>
        <button class="btn-login" id="btn-login" onclick="handleLogin()">Sign In</button>
      </div>

      <hr class="divider" style="margin-top:18px;"/>
      <p class="register-link" style="margin-top:14px;">
        No account? <a onclick="toggleForm('register')">Register here</a>
      </p>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-section">
      <div style="display:flex; flex-direction:column; gap:14px;">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Choose username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Choose password"/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="Repeat password"/>
        </div>
        <button class="btn-login" id="btn-register" onclick="handleRegister()">Create Account</button>
      </div>

      <hr class="divider" style="margin-top:18px;"/>
      <p class="register-link" style="margin-top:14px;">
        Have an account? <a onclick="toggleForm('login')">Sign in here</a>
      </p>
    </div>

  </div>

  <script src="js/auth.js"></script>

</body>
</html>
