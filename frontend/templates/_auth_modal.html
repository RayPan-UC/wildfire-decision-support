<!-- ══════════════════════════════════════════════════════════
     AUTH MODAL
══════════════════════════════════════════════════════════ -->
<div id="auth-modal-overlay" class="modal-overlay">
  <div id="auth-modal">
    <div class="auth-modal-header">
      <span id="auth-modal-title">Sign In</span>
      <button id="auth-modal-close">✕</button>
    </div>
    <form id="auth-form">
      <input type="text"     id="auth-username" placeholder="Username" autocomplete="username" required>
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password" required>
      <div id="auth-error"></div>
      <button type="submit"  id="auth-submit-btn">Login</button>
      <button type="button"  id="auth-toggle-mode">Don't have an account? Register</button>
    </form>
  </div>
</div>
