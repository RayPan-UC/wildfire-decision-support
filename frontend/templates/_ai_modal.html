<!-- ══════════════════════════════════════════════════════════
     AI COPILOT MODAL
══════════════════════════════════════════════════════════ -->
<div id="ai-modal-overlay" class="modal-overlay">
  <div id="ai-modal">

    <!-- Modal header -->
    <div class="ai-modal-header">
      <span class="ai-modal-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:5px"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8V4"/><circle cx="12" cy="4" r="1" fill="currentColor"/><circle cx="9" cy="15" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="15" r="1.5" fill="currentColor" stroke="none"/></svg>AI Copilot</span>
      <span id="ai-modal-badge" class="ai-badge"></span>
      <div class="header-spacer"></div>
      <button id="ai-modal-close" class="modal-close-btn">✕</button>
    </div>

    <!-- Modal body: report (left) + chat (right) -->
    <div class="ai-modal-body">

      <!-- Left: report -->
      <div id="ai-report-col">
        <div id="ai-report-loading" class="report-loading-state">
          <div class="spinner"></div>
          <div>
            <div style="font-weight:600;margin-bottom:4px">Generating AI analysis…</div>
            <div style="font-size:11px;opacity:.6">This may take 15–30 seconds</div>
          </div>
        </div>
        <div id="ai-report-ready" class="hidden">
          <div class="report-tabs" id="ai-report-tabs"></div>
          <div id="ai-report-panels"></div>
        </div>
      </div>

      <!-- Divider -->
      <div class="ai-col-divider"></div>

      <!-- Right: chat -->
      <div id="ai-chat-col">
        <div class="chat-col-title">Chat</div>
        <div id="chat-messages">
          <div class="chat-welcome">Ask anything about this fire event and the AI analysis above.</div>
        </div>
        <div class="chat-input-row">
          <textarea id="chat-input" rows="2" placeholder="Ask about evacuation routes, population at risk…"></textarea>
          <button id="chat-send-btn">▶</button>
        </div>
      </div>

    </div><!-- /ai-modal-body -->
  </div><!-- /ai-modal -->
</div>
