openapi: 3.0.0
info:
  title: Wildfire Decision Support API
  version: 1.0.0

paths:

  # ── Auth ──────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                password:
                  type: string
                  minLength: 6
      responses:
        201:
          description: Account created successfully
        400:
          description: Validation error
        409:
          description: Username already exists

  /api/auth/login:
    post:
      summary: Login and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  username:
                    type: string
        401:
          description: Invalid credentials

  /api/auth/verify:
    get:
      summary: Verify a JWT token
      security:
        - bearerAuth: []
      responses:
        200:
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  username:
                    type: string
        401:
          description: Token invalid or expired

  # ── Events ────────────────────────────────────────────────────────

  /api/events/:
    get:
      summary: List all fire events
      responses:
        200:
          description: Array of fire events ordered by year descending
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    year:
                      type: integer
                    time_start:
                      type: string
                      format: date-time
                    time_end:
                      type: string
                      format: date-time
                    description:
                      type: string
                    bbox:
                      type: array
                      items:
                        type: number
                      description: "[minLon, minLat, maxLon, maxLat]"
                      example: [-112.634, 56.157, -110.002, 57.380]

  # ── WIP ───────────────────────────────────────────────────────────

  /api/hotspots:
    get:
      summary: "[WIP] Get fire hotspots (NASA FIRMS)"
      responses:
        200:
          description: GeoJSON hotspot features

  /api/risk-zones/:
    get:
      summary: ML-predicted wildfire spread risk zones
      parameters:
        - in: query
          name: t1
          required: false
          schema:
            type: string
            format: date-time
            example: "2016-05-03T08:54:00"
          description: >
            T1 timestamp (ISO 8601). Snapped to nearest observed overpass.
            Defaults to 2016-05-03T08:54:00 if omitted.
        - in: query
          name: delta_t_h
          required: false
          schema:
            type: number
            example: 6.0
          description: >
            Hours ahead to predict (e.g. 3.0, 6.0, 12.0).
            Defaults to 6.0 if omitted.
      responses:
        200:
          description: Risk zone GeoJSON with metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  t1:
                    type: string
                    format: date-time
                    description: Actual T1 used (snapped to nearest overpass)
                  t2:
                    type: string
                    format: date-time
                    description: Predicted T2 = T1 + delta_t_h
                  delta_t_h:
                    type: number
                  cached:
                    type: boolean
                    description: True if result was served from disk cache
                  geojson:
                    type: object
                    description: GeoJSON FeatureCollection
                    properties:
                      type:
                        type: string
                        example: FeatureCollection
                      features:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              example: Feature
                            geometry:
                              type: object
                              description: Merged polygon (EPSG:4326)
                            properties:
                              type: object
                              properties:
                                risk:
                                  type: string
                                  enum: [high, medium, low]
                                  description: >
                                    high   = prob ≥ 0.36 (xgb threshold),
                                    medium = prob ≥ 0.15,
                                    low    = prob ≥ 0.05
                                cell_count:
                                  type: integer
                                prob_mean:
                                  type: number
                                prob_max:
                                  type: number
        503:
          description: Study data or model not available (STUDY_DIR misconfigured)
        500:
          description: Internal inference error

  /api/chat:
    post:
      summary: "[WIP] AI wildfire assistant"
      responses:
        200:
          description: Assistant response

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

